<body>

    <div class="login-mains account-pages my-5 pt-sm-5 d-flex justify-content-center align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-5 col-sm-8">
                    <div class="card">
                        <div class="row">
                            <div class="col-lg-12">
                                <div class="text-center justify-content-center align-items-center">
                                    <h2 class="text-dark mb-1 mt-4">LOGIN</h2>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-4">
                            <div class="p-2">
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="form-group form-group-custom mb-4">
                                            <input type="text" class="form-control" id="username" placeholder="Email"/>
                                            <span id="error-email" class="span-error"></span>
                                        </div>
                                        <div class="form-group form-group-custom mb-4">
                                            <input type="password" class="form-control" id="userpassword" placeholder="Password"/>
                                            <span id="error-password" class="span-error"></span>
                                        </div>
                                        <div class="mt-4 text-center">
                                            <button class="btn btn-primary w-50" onclick="loginUser(event);">
                                                Log In
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function validateInput(inputId, errorId, regex, emptyMessage, invalidMessage) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);

            function validate() {
                const value = input.value.trim();
                if (value === '') {
                    error.innerHTML = emptyMessage;
                    error.style.display = 'inline';
                    return false;
                } else if (!regex.test(value)) {
                    error.innerHTML = invalidMessage;
                    error.style.display = 'inline';
                    return false;
                } else {
                    error.style.display = 'none';
                    return true;
                }
            }

            // Attach event listeners
            input.addEventListener('input', validate);
            input.addEventListener('blur', validate); // Use 'blur' instead of 'change'

            // Initial validation
            return validate();
        }

        async function fetchUserData() {
            try {
                const response = await fetch('https://krinik.pythonanywhere.com/login_get/');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Response Data:', data);
                return data;
                
            } catch (error) {
                console.error('Error:', error);
                throw error;
            }
        }

        async function loginUser(event) {
            event.preventDefault(); // Prevent the form from submitting the default way
            
            const email = document.getElementById('username').value;
            const password = document.getElementById('userpassword').value;
            
            const emailValid = validateInput('username', 'error-email', /^[^\s@]+@[^\s@]+\.[^\s@]+$/, 'Email cannot be empty.', 'Please enter a valid email address.');
            const passwordValid = validateInput('userpassword', 'error-password', /.{6,}/, 'Password cannot be empty.', 'Password must be at least 6 characters long.');
            
            if (!emailValid || !passwordValid) {
                return false;
            }
            
            try {
                const data = await fetchUserData();
                
                const user = data.data.find(user => user.email === email);
                if (!user || user.password !== password) {
                    if (!user) {
                        document.getElementById('error-email').innerHTML = 'Email not found.';
                    } else {
                        document.getElementById('error-password').innerHTML = 'Incorrect password.';
                    }
                    return false;
                }
        
                alert('Login successful!');
                // Redirect to the dashboard or another page
                window.location.href = 'dashboard.html';
        
            } catch (error) {
                console.error('Error in loginUser:', error);
            }
            
            return false;
        }
    </script>
