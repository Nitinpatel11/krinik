    <form id="login-form">
      <label for="email">Email:</label>
      <input id="email" type="email" placeholder="Email" required>
      <div id="error-email"></div>
      <label for="password">Password:</label>
      <input id="password" type="password" placeholder="Password" required>
      <div id="error-password"></div>
      
      <label for="admin-type">Admin Type:</label>
      <select id="admin-type" required>
        <option value="" disabled selected>Select Admin Type</option>
        <option value="admin">Admin</option>
        <option value="super admin">Super Admin</option>
      </select>
      <div id="error-admin-type"></div>
      
      <div id="error-message"></div>
      <button type="submit">Login</button>
    </form>
    

  <script>
    const loginForm = document.getElementById('login-form');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const adminTypeInput = document.getElementById('admin-type');
const errorEmail = document.getElementById('error-email');
const errorPassword = document.getElementById('error-password');
const errorAdminType = document.getElementById('error-admin-type');
const errorMessage = document.getElementById('error-message');

const COOKIE_NAME = 'userEmail';
const ADMIN_TYPE_COOKIE_NAME = 'adminType'; // Separate cookie for admin type
const COOKIE_EXPIRATION_SECONDS = 30; // Cookie expiration time in seconds

function setCookie(name, value, seconds) {
  const expires = new Date();
  expires.setTime(expires.getTime() + (seconds * 1000));
  
  // Convert expiration date to IST
  const offsetIST = 5.5 *  60 * 60 * 1000; // IST is UTC+5:30
  const expiresIST = new Date(expires.getTime() + offsetIST);
  
  document.cookie = `${name}=${encodeURIComponent(value)};expires=${expiresIST.toUTCString()};path=/`;
}

function getCookie(name) {
  const nameEQ = `${name}=`;
  const cookies = document.cookie.split(';');
  for (let i = 0; i < cookies.length; i++) {
    let c = cookies[i];
    while (c.charAt(0) === ' ') c = c.substring(1);
    if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length));
  }
  return null;
}

function eraseCookie(name) {
  document.cookie = `${name}=; Max-Age=-99999999; path=/`;
}

function checkCookieExpiration() {
  const email = getCookie(COOKIE_NAME);
  const reloaded = sessionStorage.getItem('reloaded');

  if (!email && !reloaded) {
    // Set the reloaded flag to prevent infinite reload loop
    sessionStorage.setItem('reloaded', 'true');
    // Reload the page
    window.location.reload();
  } else if (email) {
    // Clear the reloaded flag if the cookie is present
    sessionStorage.removeItem('reloaded');
  }
}

loginForm.addEventListener('submit', async (event) => {
  event.preventDefault();

  const email = emailInput.value;
  const password = passwordInput.value;
  const adminType = adminTypeInput.value;

  // Reset error messages
  errorEmail.textContent = '';
  errorPassword.textContent = '';
  errorAdminType.textContent = '';
  errorMessage.textContent = '';

  if (!email || !password || !adminType) {
    if (!email) errorEmail.textContent = 'Email is required';
    if (!password) errorPassword.textContent = 'Password is required';
    if (!adminType) errorAdminType.textContent = 'Admin type is required';
    return;
  }

  try {
    const response = await fetch('https://krinik.pythonanywhere.com/login/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, password, admin_type: adminType })
    });

    if (!response.ok) {
      throw new Error(`Login failed with status: ${response.status}`);
    }

    const data = await response.json();
    console.log('Response data:', data);

    if (data.status === 'success') {
      // Store email in cookie with a 30-second expiration
      setCookie(COOKIE_NAME, email, COOKIE_EXPIRATION_SECONDS);
      // Store admin type in a separate cookie
      setCookie(ADMIN_TYPE_COOKIE_NAME, adminType, COOKIE_EXPIRATION_SECONDS);
      
      // Redirect to protected page
      if (adminType === 'super admin') {
        window.location.href = './dashboard.html';
      } else {
        window.location.href = './dashboard.html';
      }
    } else {
      errorMessage.textContent = data.message || 'Invalid email or password';
    }
  } catch (error) {
    console.error('Error during login:', error);
    errorMessage.textContent = 'Login failed. Please try again.';
  }
});

// Check cookie validity on page load
checkCookieExpiration();

  </script>
