    <form id="login-form">
        <label for="username">Email:</label>
        <input id="username" type="email" placeholder="Email">
        <div id="error-email"></div>
        <label for="userpassword">Password:</label>
        <input id="userpassword" type="password" placeholder="Password">
        <div id="error-password"></div>
        <button type="submit">Login</button>
    </form>
    
    <script>
        // Get the form elements
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('username');
        const passwordInput = document.getElementById('userpassword');
        const errorEmail = document.getElementById('error-email');
        const errorPassword = document.getElementById('error-password');
      
        // Function to set a cookie with an expiration time in seconds
        function setCookie(name, value, seconds) {
            const date = new Date();
            date.setTime(date.getTime() + (seconds * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + (value || "") + ";" + expires + ";path=/";
        }
    
        // Function to get a cookie value
        function getCookie(name) {
            const nameEQ = name + "=";
            const cookies = document.cookie.split(';');
            for(let i = 0; i < cookies.length; i++) {
                let c = cookies[i];
                while (c.charAt(0) === ' ') c = c.substring(1);
                if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }
    
        // Function to delete a cookie
        function deleteCookie(name) {
            document.cookie = name + '=; Max-Age=-99999999;';
        }
      
        // Add event listener to the form
        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
      
            // Get the input values
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
      
            // Clear previous error messages
            errorEmail.innerHTML = '';
            errorPassword.innerHTML = '';
      
            // Validate the inputs
            if (!email || !password) {
                if (!email) errorEmail.innerHTML = 'Email cannot be empty.';
                if (!password) errorPassword.innerHTML = 'Password cannot be empty.';
                return;
            }
      
            try {
                const response = await fetch('https://krinik.pythonanywhere.com/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
      
                // Check if the response is OK
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
      
                // Get the response data
                const data = await response.json();
                console.log('Response data:', data);
      
                // Check if the login is successful
                if (data.status) {
                    // Store the session data in cookies with a 30-second expiration
                    setCookie('sessionToken', data.token, 30); // Adjust 'data.token' based on the actual response structure
                  
                    // Redirect to the dashboard or another page
                    window.location.href = './dashboard.html';
                } else {
                    errorEmail.innerHTML = 'Email or password is incorrect.';
                }
            } catch (error) {
                console.error('Error:', error);
                errorEmail.innerHTML = 'An error occurred. Please try again later.';
            }
        });
    
        // Function to check for cookie and redirect if not found
        function checkCookie() {
            if (!getCookie('sessionToken')) {
                window.location.href = './index.html';
            }
        }
    
        // Set an interval to check the cookie every second
        setInterval(checkCookie, 1000);
    </script>
